name: Build app packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ad-hoc signed app packages
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build app bundle
        run: bash scripts/build-app.sh

      - name: Upload app zip
        uses: actions/upload-artifact@v4
        with:
          name: roma-just-talk-app
          path: dist/*.app.zip
          if-no-files-found: error

      - name: Upload app dmg
        uses: actions/upload-artifact@v4
        with:
          name: roma-just-talk-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload signing proof
        uses: actions/upload-artifact@v4
        with:
          name: roma-just-talk-signing-proof
          path: dist/signing-proof/*
          if-no-files-found: error
