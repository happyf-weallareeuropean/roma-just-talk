name: RomaCore

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/romacore.yml"
      - "RomaCore/**"
      - "docs/windows-port.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/romacore.yml"
      - "RomaCore/**"
      - "docs/windows-port.md"

jobs:
  macos:
    name: RomaCore macOS
    runs-on: macos-26
    timeout-minutes: 20

    defaults:
      run:
        working-directory: RomaCore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run core checks
        run: swift run RomaCoreChecks

      - name: Run noninteractive proof checks
        run: |
          swift run RomaProofAgent doctor
          swift run RomaProofAgent pre-roll-proof --out "$RUNNER_TEMP/roma-core-proof.wav"
          test -s "$RUNNER_TEMP/roma-core-proof.wav"
          swift run RomaProofAgent miniaudio-capture-doctor
          swift run RomaProofAgent transcribe-proof-doctor
          swift run RomaProofAgent dictation-pipeline-proof --out "$RUNNER_TEMP/roma-pipeline-proof.wav" --text "hmm... just talk." --replace "just talk=roma-just-talk"
          test -s "$RUNNER_TEMP/roma-pipeline-proof.wav"
          swift run RomaProofAgent windows-hotkey-doctor
          swift run RomaProofAgent windows-paste-doctor

  windows:
    name: RomaCore Windows
    runs-on: windows-2022
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh
        working-directory: RomaCore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Visual Studio C++ tools
        working-directory: .
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe was not found"
          }
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio C++ x64/x86 tools were not found"
          }
          Write-Host "vs_install=$vsInstall"

      - name: Install Swift toolchain
        working-directory: .
        run: |
          winget source update
          winget install --id Swift.Toolchain -e --source winget --accept-source-agreements --accept-package-agreements --disable-interactivity
          $swiftRoots = @(
            "$env:LOCALAPPDATA\Programs\Swift",
            "$env:ProgramFiles\Swift",
            "$env:SystemDrive\Library\Developer"
          )
          $toolchainDirs = $swiftRoots |
            ForEach-Object { Join-Path $_ "Toolchains" } |
            Where-Object { Test-Path -LiteralPath $_ }
          if (!$toolchainDirs) {
            throw "Swift toolchain directory was not found"
          }
          $toolchainRoot = Get-ChildItem -Path $toolchainDirs -Directory |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $swiftBin = Join-Path $toolchainRoot.FullName "usr\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $swiftBin

          $runtimeDirs = $swiftRoots |
            ForEach-Object { Join-Path $_ "Runtimes" } |
            Where-Object { Test-Path -LiteralPath $_ }
          if ($runtimeDirs) {
            $runtimeRoot = Get-ChildItem -Path $runtimeDirs -Directory |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            $runtimeBin = Join-Path $runtimeRoot.FullName "usr\bin"
            Add-Content -Path $env:GITHUB_PATH -Value $runtimeBin
          }

      - name: Show Swift version
        run: swift --version

      - name: Parse Windows proof script
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw .\Scripts\windows-proof.ps1),
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Host
            throw "PowerShell parse errors in windows-proof.ps1"
          }

      - name: Run noninteractive Windows proof
        run: |
          $env:ROMA_MOCK_STT_KEY = "roma-mock-ci-key"
          $proofDir = "$env:RUNNER_TEMP\roma-proof"
          $mockPort = 48765
          $mockJob = Start-Job -ScriptBlock {
            param([int]$Port)

            $listener = [System.Net.Sockets.TcpListener]::new(
              [System.Net.IPAddress]::Parse("127.0.0.1"),
              $Port
            )
            $listener.Start()
            try {
              $client = $listener.AcceptTcpClient()
              try {
                $stream = $client.GetStream()
                $buffer = [byte[]]::new(8192)
                $requestBytes = [System.Collections.Generic.List[byte]]::new()
                $contentLength = 0
                $bodyBytesRead = 0
                $sawHeaders = $false

                :readRequest while ($true) {
                  $read = $stream.Read($buffer, 0, $buffer.Length)
                  if ($read -le 0) {
                    break
                  }

                  for ($index = 0; $index -lt $read; $index++) {
                    $requestBytes.Add($buffer[$index])
                  }

                  $requestText = [System.Text.Encoding]::ASCII.GetString($requestBytes.ToArray())
                  $headerEnd = $requestText.IndexOf("`r`n`r`n")
                  if (!$sawHeaders -and $headerEnd -ge 0) {
                    $sawHeaders = $true
                    $headers = $requestText.Substring(0, $headerEnd)
                    $match = [regex]::Match($headers, "Content-Length:\s*(\d+)", "IgnoreCase")
                    if ($match.Success) {
                      $contentLength = [int]$match.Groups[1].Value
                    }
                    $bodyBytesRead = $requestBytes.Count - ($headerEnd + 4)
                  } elseif ($sawHeaders) {
                    $bodyBytesRead += $read
                  }

                  if ($sawHeaders -and $bodyBytesRead -ge $contentLength) {
                    break readRequest
                  }
                }

                $body = '{"text":"roma just talk proof","language":"en","duration":1.25}'
                $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($body)
                $headers = "HTTP/1.1 200 OK`r`nContent-Type: application/json`r`nContent-Length: $($bodyBytes.Length)`r`nConnection: close`r`n`r`n"
                $headerBytes = [System.Text.Encoding]::ASCII.GetBytes($headers)
                $stream.Write($headerBytes, 0, $headerBytes.Length)
                $stream.Write($bodyBytes, 0, $bodyBytes.Length)
                $stream.Flush()
              } finally {
                $client.Close()
              }
            } finally {
              $listener.Stop()
            }
          } -ArgumentList $mockPort

          Start-Sleep -Seconds 1
          try {
            .\Scripts\windows-proof.ps1 `
              -SkipMic `
              -OutputDir $proofDir `
              -TranscribeAudio "$proofDir\core-proof.wav" `
              -TranscribeEndpoint "http://127.0.0.1:$mockPort/v1/audio/transcriptions" `
              -TranscribeModel "mock-whisper" `
              -TranscribeApiKeyEnv "ROMA_MOCK_STT_KEY" `
              -TranscribeApiKeyName "ci-mock"
          } finally {
            if ($mockJob.State -eq "Running") {
              Wait-Job $mockJob -Timeout 10 | Out-Null
            }
            if ($mockJob.State -eq "Running") {
              Stop-Job $mockJob
            }
            Receive-Job $mockJob -ErrorAction SilentlyContinue
            Remove-Job $mockJob -Force
          }

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: romacore-windows-proof
          path: ${{ runner.temp }}\roma-proof
          if-no-files-found: error
