name: Build notarized macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Developer ID notarized DMG
    runs-on: macos-26
    timeout-minutes: 90

    env:
      APP_NAME: "roma just talk"
      DEVELOPER_ID_APPLICATION_IDENTITY: "Developer ID Application"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      MACOS_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Import Developer ID certificate
        run: bash scripts/ci/import-developer-id-certificate.sh

      - name: Build, notarize, and package
        run: bash scripts/ci/build-notarized-dmg.sh

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: roma-just-talk-notarized-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload signing proof
        uses: actions/upload-artifact@v4
        with:
          name: roma-just-talk-notarized-dmg-proof
          path: dist/signing-proof/*
          if-no-files-found: error
