<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">roma-just-talk logo</title>
  <desc id="desc">Split keyboard halves opening around a glowing voice waveform.</desc>
  <defs>
    <radialGradient id="base" cx="48%" cy="35%" r="75%">
      <stop offset="0" stop-color="#303235"/>
      <stop offset="0.56" stop-color="#17191b"/>
      <stop offset="1" stop-color="#080909"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f2f0"/>
      <stop offset="0.2" stop-color="#bebfbd"/>
      <stop offset="0.48" stop-color="#ececea"/>
      <stop offset="0.76" stop-color="#9c9d9b"/>
      <stop offset="1" stop-color="#f5f5f3"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#4b4c4b" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242628"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe671"/>
      <stop offset="0.45" stop-color="#ffc414"/>
      <stop offset="1" stop-color="#ff9d00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
    <filter id="keyShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1.5" flood-color="#ffffff" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.66 0 0 0.63  0 0 0.05 0 0  0 0 0 0.92 0" result="gold"/>
      <feMerge>
        <feMergeNode in="gold"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="roundIcon">
      <rect x="26" y="26" width="972" height="972" rx="104"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="#000"/>
  <g clip-path="url(#roundIcon)">
    <rect x="26" y="26" width="972" height="972" rx="104" fill="url(#base)"/>
    <rect x="26" y="26" width="972" height="972" rx="104" fill="#ffffff" filter="url(#grain)" opacity="0.26"/>
    <rect x="34" y="34" width="956" height="956" rx="98" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

    <g filter="url(#softShadow)">
      <path d="M122 290
               Q140 246 195 255
               L438 296
               L400 342
               L438 381
               L401 421
               L441 462
               L404 502
               L443 542
               L407 582
               L446 623
               L410 665
               L434 781
               L142 731
               Q96 723 86 677
               L62 367
               Q58 313 122 290Z"
            fill="url(#metal)" stroke="url(#edge)" stroke-width="4"/>
      <path d="M902 290
               Q884 246 829 255
               L586 296
               L624 342
               L586 381
               L623 421
               L583 462
               L620 502
               L581 542
               L617 582
               L578 623
               L614 665
               L590 781
               L882 731
               Q928 723 938 677
               L962 367
               Q966 313 902 290Z"
            fill="url(#metal)" stroke="url(#edge)" stroke-width="4"/>
    </g>

    <g filter="url(#keyShadow)">
      <g transform="translate(151 306) rotate(7)">
        <rect x="0" y="0" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="112" y="0" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-2" y="108" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="110" y="108" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-4" y="216" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="108" y="216" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-10" y="328" width="232" height="66" rx="13" fill="url(#key)"/>
      </g>
      <g transform="translate(690 316) rotate(-7)">
        <rect x="-86" y="0" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="26" y="0" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-84" y="108" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="28" y="108" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-82" y="216" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="30" y="216" width="86" height="75" rx="13" fill="url(#key)"/>
        <rect x="-116" y="328" width="232" height="66" rx="13" fill="url(#key)"/>
      </g>
    </g>

    <g filter="url(#glow)" fill="url(#wave)">
      <rect x="402" y="503" width="14" height="36" rx="7"/>
      <rect x="427" y="482" width="14" height="78" rx="7"/>
      <rect x="452" y="462" width="14" height="118" rx="7"/>
      <rect x="477" y="500" width="14" height="44" rx="7"/>
      <rect x="502" y="416" width="14" height="202" rx="7"/>
      <rect x="527" y="456" width="14" height="132" rx="7"/>
      <rect x="552" y="474" width="14" height="96" rx="7"/>
      <rect x="577" y="496" width="14" height="54" rx="7"/>
      <rect x="602" y="511" width="14" height="28" rx="7"/>
    </g>
  </g>
</svg>
